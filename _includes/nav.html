<header class="site-nav">
  <div class="container nav-inner">
    <a class="nav-brand" href="{{ '/' | relative_url }}">
      <img class="nav-logo" src="{{ '/images/brand_logo.png' | relative_url }}" alt="Selim Sarowar Logo">
    </a>

    <nav class="nav-links" aria-label="Primary navigation">
      {% for link in site.data.navigation.main %}
        {% assign target = link.url | relative_url %}
        <a class="nav-link{% if page.url == link.url %} is-active{% endif %}" href="{{ target }}">{{ link.title }}</a>
      {% endfor %}
    </nav>

    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light and dark theme" title="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>

      <button class="nav-burger" id="nav-burger" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
    </div>
  </div>
</header>

<div class="nav-overlay" id="nav-overlay" hidden></div>
<aside class="mobile-menu" id="mobile-menu" aria-hidden="true">
  <div class="mobile-menu__head">
    <span class="mobile-menu__title">Menu</span>
    <button class="mobile-menu__close" id="mobile-menu-close" type="button" aria-label="Close menu">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  {% for link in site.data.navigation.main %}
    <a class="{% if page.url == link.url %}is-active{% endif %}" href="{{ link.url | relative_url }}">{{ link.title }}</a>
  {% endfor %}
</aside>
