<!-- Theme toggle + BibTeX collapse (vanilla, no jQuery dependency) -->
<script>
  (function () {
    function initThemeToggle() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var active = document.documentElement.getAttribute('data-theme');
        var next = active === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
      });
    }

    function initBibtexToggles() {
      var toggles = document.querySelectorAll('.bibtex-toggle');
      toggles.forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          var targetSel = btn.getAttribute('data-target');
          var block = targetSel ? document.querySelector(targetSel) : btn.nextElementSibling;
          if (!block) return;
          block.classList.toggle('open');
        });
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        initThemeToggle();
        initBibtexToggles();
      });
    } else {
      initThemeToggle();
      initBibtexToggles();
    }
  })();
</script>
