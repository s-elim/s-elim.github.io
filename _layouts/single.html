---
layout: default
---
{% assign _title = page.title | strip_html | strip %}
<main id="main-content" class="site-main">
  <div class="container container--content">
    {% if _title != "" %}
      <header class="page-head">
        <h1 class="page-head__title">{{ page.title | markdownify | remove: "<p>" | remove: "</p>" }}</h1>
        {% if page.subtitle %}<p class="page-head__subtitle">{{ page.subtitle }}</p>{% endif %}
      </header>
    {% endif %}
    <div class="page-body">
      {{ content }}
    </div>
  </div>
</main>
